version: "3.8"

services:
  scamguard:
    build: .
    container_name: scamguard
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      NODE_ENV: production

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}

      # PRD-1 AI Engine
      PRD1_BASE_URL: ${PRD1_BASE_URL:-http://prd1:8000}

      # PRD-2 Risk Orchestrator
      PRD2_BASE_URL: ${PRD2_BASE_URL:-http://prd2:4000}
      PRD2_WS_URL: ${PRD2_WS_URL:-ws://prd2:4000/ws/alerts}

      # ScamGuard public URL
      SCAMGUARD_PUBLIC_URL: ${SCAMGUARD_PUBLIC_URL:-http://localhost:3001}

      # Deepgram
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}

      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - scamguard-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - vanguard

networks:
  vanguard:
    name: vanguard
    external: true

volumes:
  scamguard-data:
