<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fraud Intelligence Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; color: #1f2937; padding: 2rem; max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; }
        h1 { margin-top: 0; color: #111827; }
        textarea { width: 100%; height: 100px; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
        button { background-color: #2563eb; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-size: 1rem; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        #result-container { display: none; }
        pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.875rem; }
        .verdict-FRAUD { color: #dc2626; font-weight: bold; font-size: 1.25rem; }
        .verdict-SAFE { color: #16a34a; font-weight: bold; font-size: 1.25rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🔍 AI Fraud Intelligence Tester</h1>
        <p>Paste a suspicious SMS or WhatsApp message below to analyze it.</p>
        
        <textarea id="message" placeholder="E.g., Dear Customer, your HDFC bank KYC has expired. Update immediately via this link http://fake-kyc.in or your account will be blocked."></textarea>
        
        <button id="analyze-btn" onclick="analyzeMessage()">Analyze Message</button>
    </div>

    <div class="card" id="result-container">
        <h2>Analysis Result</h2>
        <p>Verdict: <span id="verdict-text"></span></p>
        <p>Risk Score: <span id="risk-score"></span></p>
        <p>Scam Type: <span id="scam-type"></span></p>
        
        <h3>Raw Data from API</h3>
        <pre id="raw-json"></pre>
    </div>

    <script>
        async function analyzeMessage() {
            const message = document.getElementById('message').value;
            if (!message) return alert("Please enter a message!");

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerText = "Analyzing...";

            try {
                // Call the local backend API we built
                const response = await fetch('http://localhost:3000/api/v1/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        source: "web"
                    })
                });

                const data = await response.json();

                // Show the result
                document.getElementById('result-container').style.display = 'block';
                
                const verdictSpan = document.getElementById('verdict-text');
                verdictSpan.innerText = data.verdict;
                verdictSpan.className = data.verdict === 'FRAUD' ? 'verdict-FRAUD' : 'verdict-SAFE';
                
                document.getElementById('risk-score').innerText = data.risk_score;
                document.getElementById('scam-type').innerText = data.scam_type;
                
                document.getElementById('raw-json').innerText = JSON.stringify(data, null, 2);

            } catch (error) {
                alert("Error connecting to the API. Make sure the server is running on localhost:3000!");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Analyze Message";
            }
        }
    </script>
</body>
</html>
